<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Избягай от Коце Кисьов</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Main Menu -->
    <div id="mainMenu">
      <div class="menu-bg"></div>
      <div class="menu-content">
        <div class="menu-subtitle">3D приключение с бягане и криене</div>
        <div class="menu-title">Избягай от<br>Коце Кисьов</div>
        <div class="menu-buttons">
          <button class="btn btn-primary" onclick="startGame()">
            <i class="fas fa-play"></i> Започни
          </button>
          <button class="btn btn-secondary" onclick="openShop()">
            <i class="fas fa-store"></i> Магазин
          </button>
          <button class="btn btn-secondary" onclick="openLeaderboard()">
            <i class="fas fa-trophy"></i> Класация
          </button>
          <button class="btn btn-secondary" onclick="openAbout()">
            <i class="fas fa-info-circle"></i> За играта
          </button>
        </div>
        <div class="menu-footer">
          <span id="menuCredits"><i class="fas fa-coins"></i> 0</span>
          <span id="menuUser" style="display:none; margin-left:12px; font-size:0.85rem; color:var(--muted);"></span>
        </div>
        <div style="margin-top:1rem;">
          <button class="btn btn-secondary btn-sm" id="authBtn" onclick="openAuth()">
            <i class="fas fa-sign-in-alt"></i> Вход
          </button>
        </div>
      </div>
    </div>

    <!-- Game canvas (behind HUD) -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="crosshair" id="crosshair">+</div>
      <div id="interactionPrompt"></div>
      <div id="topBar">
        <div id="noiseMeter"><i class="fas fa-ear-listen"></i></div>
        <div id="timerDisplay"><i class="fas fa-clock"></i> <span id="timeText">00:00</span></div>
        <div id="creditsDisplay"><i class="fas fa-coins"></i> <span id="creditsText">0</span></div>
      </div>
      <div id="bottomBars">
        <div class="bar-group" id="staminaGroup">
          <i class="fas fa-running"></i>
          <div class="bar-bg"><div class="bar-fill" id="staminaFill"></div></div>
        </div>
        <div class="bar-group" id="batteryGroup">
          <i class="fas fa-bolt"></i>
          <div class="bar-bg"><div class="bar-fill" id="batteryFill"></div></div>
        </div>
      </div>
      <div id="hotbar">
        <div class="slot" id="slot-1"><span class="slot-key">1</span></div>
        <div class="slot" id="slot-2"><span class="slot-key">2</span></div>
        <div class="slot" id="slot-3"><span class="slot-key">3</span></div>
        <div class="slot" id="slot-4"><span class="slot-key">4</span></div>
      </div>
      <div id="heartsRow"></div>
    </div>

    <!-- Auth Overlay -->
    <div id="authOverlay" class="overlay">
      <div class="overlay-panel" style="max-width:380px;">
        <h2><i class="fas fa-user-circle"></i> Профил</h2>
        <div id="authLoggedOut">
          <div class="form-group">
            <input type="email" id="authEmail" placeholder="Имейл" class="form-input">
          </div>
          <div class="form-group">
            <input type="password" id="authPassword" placeholder="Парола" class="form-input">
          </div>
          <div style="display:flex; gap:8px; justify-content:center;">
            <button class="btn btn-primary btn-sm" onclick="login()"><i class="fas fa-sign-in-alt"></i> Вход</button>
            <button class="btn btn-secondary btn-sm" onclick="register()"><i class="fas fa-user-plus"></i> Регистрация</button>
          </div>
          <p id="authError" style="color:#ef5350; font-size:0.85rem; margin-top:8px; display:none;"></p>
        </div>
        <div id="authLoggedIn" style="display:none;">
          <p id="authUserEmail" style="margin-bottom:1rem;"></p>
          <button class="btn btn-secondary btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Изход</button>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="closeAuth()" style="margin-top:1rem;">
          <i class="fas fa-times"></i> Затвори
        </button>
      </div>
    </div>

    <!-- Shop Overlay -->
    <div id="shopOverlay" class="overlay">
      <div class="overlay-panel overlay-wide">
        <h2><i class="fas fa-store"></i> Магазин</h2>
        <div class="shop-tabs">
          <button class="shop-tab active" data-tab="cosmetics" onclick="switchShopTab('cosmetics')">
            <i class="fas fa-tshirt"></i> Козметики
          </button>
          <button class="shop-tab" data-tab="upgrades" onclick="switchShopTab('upgrades')">
            <i class="fas fa-rocket"></i> Качества
          </button>
          <button class="shop-tab" data-tab="services" onclick="switchShopTab('services')">
            <i class="fas fa-hand-holding-usd"></i> Услуги
          </button>
        </div>
        <div id="shopContent" class="shop-content"></div>
        <div class="shop-footer">
          <span id="shopCredits"><i class="fas fa-coins"></i> <span id="shopCreditsAmount">0</span></span>
          <button class="btn btn-secondary btn-sm" onclick="closeShop()"><i class="fas fa-times"></i> Затвори</button>
        </div>
      </div>
    </div>

    <!-- Admin Overlay (for owner/admin) -->
    <div id="adminOverlay" class="overlay">
      <div class="overlay-panel" style="max-width:500px;">
        <h2><i class="fas fa-crown"></i> Админ панел</h2>
        <div class="form-group">
          <select id="adminCategory" class="form-input">
            <option value="cosmetics">Козметики</option>
            <option value="upgrades">Качества</option>
            <option value="services">Услуги</option>
          </select>
        </div>
        <div class="form-group">
          <input type="text" id="adminName" placeholder="Име" class="form-input">
        </div>
        <div class="form-group">
          <input type="text" id="adminIcon" placeholder="Icon (FA class, напр. fa-hat-wizard)" class="form-input">
        </div>
        <div class="form-group">
          <input type="number" id="adminCost" placeholder="Цена (кредити)" class="form-input">
        </div>
        <div id="adminCosmeticFields">
          <div class="form-group">
            <select id="adminRarity" class="form-input">
              <option value="common">Обикновено</option>
              <option value="normal">Нормално</option>
              <option value="rare">Рядко</option>
            </select>
          </div>
          <div class="form-group">
            <select id="adminType" class="form-input">
              <option value="shirt">Тениска</option>
              <option value="hat">Шапка</option>
              <option value="glasses">Очила</option>
              <option value="accessory">Аксесоар</option>
            </select>
          </div>
          <div class="form-group">
            <input type="text" id="adminColor" placeholder="Цвят (hex, напр. #ff3333)" class="form-input">
          </div>
        </div>
        <div id="adminUpgradeFields" style="display:none;">
          <div class="form-group">
            <select id="adminEffectType" class="form-input">
              <option value="speed">Бързина</option>
              <option value="jump">Висок скок</option>
              <option value="stamina">Издръжливост</option>
            </select>
          </div>
          <div class="form-group">
            <input type="number" id="adminEffectValue" placeholder="Стойност на ефекта (напр. 1.5)" class="form-input" step="0.1" value="1">
          </div>
          <div class="form-group">
            <input type="number" id="adminDuration" placeholder="Времетраене (секунди, 0 = постоянно)" class="form-input" value="0">
          </div>
        </div>
        <div class="form-group">
          <textarea id="adminDescription" placeholder="Описание" class="form-input" rows="2"></textarea>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addShopItem()"><i class="fas fa-plus"></i> Добави</button>
        <div id="adminItems" style="margin-top:1rem; max-height:200px; overflow-y:auto;"></div>
        <button class="btn btn-secondary btn-sm" onclick="closeAdmin()" style="margin-top:1rem;">
          <i class="fas fa-times"></i> Затвори
        </button>
      </div>
    </div>

    <!-- Leaderboard Overlay -->
    <div id="leaderboardOverlay" class="overlay">
      <div class="overlay-panel">
        <h2><i class="fas fa-trophy"></i> Класация</h2>
        <div id="leaderboardContent"><p class="muted">Все още няма рекорди</p></div>
        <button class="btn btn-secondary btn-sm" onclick="closeLeaderboard()"><i class="fas fa-times"></i> Затвори</button>
      </div>
    </div>

    <!-- About Overlay -->
    <div id="aboutOverlay" class="overlay">
      <div class="overlay-panel">
        <h2><i class="fas fa-info-circle"></i> За играта</h2>
        <div id="aboutContent"></div>
        <button class="btn btn-secondary btn-sm" onclick="closeAbout()" style="margin-top:1rem;"><i class="fas fa-times"></i> Затвори</button>
      </div>
    </div>

    <!-- Victory / Game Over -->
    <div id="victoryOverlay" class="overlay">
      <div class="overlay-panel">
        <div class="result-title victory">Избяга!</div>
        <p>Успя да се измъкнеш от Коце!</p>
        <div id="victoryStats"></div>
        <button class="btn btn-primary" onclick="closeVictory()"><i class="fas fa-check"></i> Продължи</button>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay">
      <div class="overlay-panel">
        <div class="result-title defeat">ХВАНАТ СИ!</div>
        <p>Коце Кисьов те спипа!</p>
        <button class="btn btn-primary" onclick="restartGame()"><i class="fas fa-redo"></i> Опитай пак</button>
        <button class="btn btn-secondary" onclick="backToMenu()"><i class="fas fa-home"></i> Меню</button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toastContainer"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
  <script src="engine/engine.js"></script>
  <script src="engine/player.js"></script>
  <script src="engine/koce.js"></script>
  <script src="levels/levelManager.js"></script>
  <script src="levels/library.js"></script>
  <script src="levels/corridor.js"></script>
</body>
</html>
