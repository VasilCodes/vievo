<!DOCTYPE html>
<html lang="bg" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Весо симулатор - Виево банда</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1>Весо симулатор</h1>
      <div class="game-stats">
        <span id="scoreBadge">Точки: 0</span>
        <span id="creditsBadge">💰 Кредити: 0</span>
        <span id="xpBadge">⚡ XP: 0</span>
      </div>
      <a href="/games/" class="btn-back">← Назад</a>
    </div>
    <div class="game-canvas-wrapper" style="position: relative;">
      <canvas id="gameCanvas"></canvas>
      <div id="clickTarget" style="position: absolute; width: 120px; height: 120px; border-radius: 50%; background: #4caf50; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; user-select: none; box-shadow: 0 0 20px rgba(76,175,80,0.5); font-weight: bold;">👴</div>
    </div>
    <div class="game-info">
      <p>Кликни върху Весо (👴), за да събираш точки! На всеки 10 точки печелиш 1 💰 и 5 XP!</p>
    </div>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../index.js"></script>
  <script src="script.js"></script>
</body>
</html>
