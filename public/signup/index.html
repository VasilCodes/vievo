<!DOCTYPE html>
<html lang="bg" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - Виево банда</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo" style="font-size:1.5rem;margin-bottom:1.5rem">Виево <span>банда</span></div>
      <form id="signupForm">
        <div class="form-group">
          <label for="username">Потребителско име</label>
          <input type="text" id="username" placeholder="Васил" required>
        </div>
        <div class="form-group">
          <label for="email">Имейл</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Парола</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Потвърди парола</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Регистрация</button>
        <p id="signupError" class="error-msg"></p>
        <p id="signupSuccess" class="success-msg"></p>
      </form>
      <p class="auth-switch">Имаш акаунт? <a href="/login/">Влез</a></p>
      <p class="auth-switch"><a href="/">← Начало</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../js/signup.js"></script>
</body>
</html>
