<!DOCTYPE html>
<html lang="bg" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Виево банда</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo" style="font-size:1.5rem;margin-bottom:1.5rem">Виево <span>банда</span></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Имейл</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Парола</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Влез</button>
        <p id="loginError" class="error-msg"></p>
      </form>
      <p class="auth-switch">Нямаш акаунт? <a href="/signup/">Регистрирай се</a></p>
      <p class="auth-switch"><a href="/">← Начало</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
